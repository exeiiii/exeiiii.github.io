<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <title>Threads OAuth Callback</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 24px; line-height: 1.6; }
    code { display: block; padding: 12px; background: #f3f3f3; word-break: break-all; white-space: pre-wrap; }
  </style>
</head>
<body>
  <h1>Threads OAuth Callback</h1>
  <p id="status">처리 중...</p>
  <code id="codeBox"></code>

  <script>
    const params = new URLSearchParams(location.search);
    const code = params.get("code");
    const state = params.get("state");
    const error = params.get("error");
    const errorDesc = params.get("error_description");

    const status = document.getElementById("status");
    const codeBox = document.getElementById("codeBox");

    if (error) {
      status.textContent = "오류 발생";
      codeBox.textContent = `${error}\n${errorDesc || ""}`;
    } else if (code) {
      status.textContent = "인증 성공. 아래 code를 복사하세요.";
      codeBox.textContent = `code=${code}\nstate=${state || ""}`;
    } else {
      status.textContent = "code 파라미터가 없습니다.";
      codeBox.textContent = location.href;
    }
  </script>
</body>
</html>
